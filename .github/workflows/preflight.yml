name: Production Preflight

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "*.py"
      - "requirements.txt"
      - ".github/workflows/*.yml"
      - "deploy/**"

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python files
        run: python -m py_compile *.py

      - name: Run staging preflight
        env:
          TRADING_MODE: paper
          BROKER: paper
          ENABLE_LIVE_TRADING: "false"
          ALPHA_VANTAGE_API_KEY: ci-placeholder
          FRED_API_KEY: ci-placeholder
          NEWS_API_KEY: ci-placeholder
        run: python trading_bot_main.py preflight
